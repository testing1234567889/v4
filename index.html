
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GabutXModApp</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-950 text-white">

<!-- NAVBAR -->
<nav class="nav">
<div class="container flex justify-between items-center">

<button class="menu-btn" onclick="app.toggleMenu()">
<i class="ph ph-list"></i>
</button>

<a href="#/home" class="logo">GabutXModApp</a>

<input id="search-input" placeholder="Cari aplikasi..." class="search">

</div>
</nav>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar hidden">

<a href="#/home" onclick="app.toggleMenu()">Beranda</a>
<a href="#/genre/Streaming" onclick="app.toggleMenu()">Streaming</a>
<a href="#/genre/Televisi" onclick="app.toggleMenu()">Televisi</a>

</div>

<!-- CONTENT -->
<main class="container pt-24">

<section id="view-home">

<div id="home-grid" class="grid"></div>

</section>

<section id="view-detail" class="hidden">

<button onclick="app.goHome()" class="back-btn">
← Kembali
</button>

<div class="detail-card">

<img id="detail-icon" class="detail-icon">

<h1 id="detail-title"></h1>

<p id="detail-dev"></p>

<p id="detail-version"></p>

<p id="detail-size"></p>

<div id="detail-mod"></div>

<button class="download-btn" onclick="app.showDownloadModal()">
<i class="ph ph-download"></i> Download APK
</button>

<h3 class="mt-6">Screenshot</h3>

<div id="detail-ss" class="screenshots"></div>

<p id="detail-desc"></p>

</div>

</section>

</main>

<!-- DOWNLOAD MODAL -->

<div id="download-modal" class="modal hidden">

<div class="modal-card">

<h3 class="modal-title">Server Download</h3>

<div id="download-links"></div>

<button onclick="app.closeModal()" class="close-btn">
Tutup
</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
