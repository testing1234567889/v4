<body onload="aturTampilanAwal()">
  <div class="vip-box">
    <div class="tab-buttons">
      <button onclick="bukaTab('loginToken')" id="btnLoginToken" class="active">🔑 Login Email</button>
      <button onclick="bukaTab('aktivasi')" id="btnAktivasi">🚀 Aktivasi VIP</button>
      <button onclick="bukaTab('status')" id="btnStatus">🔍 Cek Status</button>
    </div>

    <div id="loginToken" class="tab-content active">
      <input type="email" id="emailInput" placeholder="Masukkan email kamu" />
      <button onclick="cekTokenEmail()">Login Email</button>
      <div id="hasilLogin"></div>
    </div>

    <div id="aktivasi" class="tab-content">
      <input type="email" id="emailAktivasi" placeholder="Masukkan email kamu" />
      <select id="durasi">
        <option value="Mzk3MjA4NDM3NjFfM18x">1 Bulan VIP</option>
        <option value="Mzk3MjA4NDM3NjFfM18z">3 Bulan VIP</option>
        <option value="Mzk3MjA4NDM3NjFfM18xMg%3D%3D">1 Tahun VIP</option>
      </select>
      <button onclick="prosesVip()">Aktifkan VIP</button>
      <button onclick="logoutVIP()">🔓 Keluar</button>
      <div id="hasilAktivasi"></div>
    </div>

    <div id="status" class="tab-content">
      <input type="email" id="emailStatus" placeholder="Masukkan email kamu" />
      <button onclick="cekStatus()">Cek Status</button>
      <button onclick="salinStatus()">Salin Status</button>
      <div id="hasilStatus"></div>
    </div>
  </div>
  <script src="script.js"></script>
